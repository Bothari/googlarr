plex:
  url: "http://your.plex.server:32400"
  token: "your_plex_token"
  libraries:
    - "Movies"
    - "TV Shows"

schedule:
  start: "0 9 1 4 *"    # Apply prank at 9am on April 1st (cron format)
  stop: "59 23 1 4 *"   # Restore at 11:59pm on April 1st (cron format)

paths:
  originals_dir: "data/posters/originals"
  prank_dir: "data/posters/prank"

database: "data/googlarr.db"

detection:
  face_detection_confidence: 0.4
  landmark_detection_confidence: 0.4
  scale_by_face_size: true
  face_based_eye_scale: 0.28
  eye_overlay_scale: 2.0
  use_same_size_for_both_eyes: true
  prevent_floating_eyes: true
  min_face_confidence: 0.4
  use_haar_fallback: true
  movie_poster_mode: true
  max_faces: 10
