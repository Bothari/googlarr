<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Googlarr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        button {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #2a2a2a;
            border-color: #666;
        }

        button.primary {
            background: #2196F3;
            border-color: #1976D2;
        }

        button.primary:hover {
            background: #1976D2;
            border-color: #1565C0;
        }

        button.danger {
            background: #f44336;
            border-color: #d32f2f;
        }

        button.danger:hover {
            background: #d32f2f;
            border-color: #c62828;
        }

        /* Status Page */
        .status-container {
            display: none;
        }

        .status-container.active {
            display: block;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .status-card h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #2196F3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-active {
            background: #4caf50;
            color: #000;
        }

        .badge-inactive {
            background: #f44336;
            color: #fff;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            padding: 12px;
            font-size: 15px;
        }

        .failed-items {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .failed-item {
            padding: 8px;
            background: #2a1a1a;
            border-left: 3px solid #f44336;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .failed-item-name {
            font-weight: 600;
            color: #fff;
        }

        .failed-item-retries {
            color: #888;
            font-size: 12px;
        }

        /* Library Page */
        .library-container {
            display: none;
        }

        .library-container.active {
            display: block;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .library-header button {
            padding: 8px 15px;
            font-size: 14px;
        }

        .library-select {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .library-select:hover {
            background: #2a2a2a;
            border-color: #666;
        }

        .library-info {
            color: #888;
            font-size: 14px;
        }

        .poster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .poster-item {
            cursor: pointer;
            position: relative;
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 150%;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .poster-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .poster-image.original {
            opacity: 1;
            z-index: 1;
        }

        .poster-image.prank {
            opacity: 0;
            z-index: 0;
        }

        .poster-item:hover .poster-image.original {
            opacity: 0;
        }

        .poster-item:hover .poster-image.prank {
            opacity: 1;
        }

        .poster-title {
            margin-top: 10px;
            font-size: 14px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #444;
            border-top-color: #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* Back button */
        .back-button {
            margin-right: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .poster-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }

            .library-header {
                flex-direction: column;
                align-items: stretch;
            }

            .library-header button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .poster-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }

            header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            nav {
                width: 100%;
            }

            nav button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Googlarr</h1>
            <nav>
                <button id="statusBtn" class="primary" onclick="showStatus()">Status</button>
                <button id="libraryBtn" onclick="showLibrary()">Library</button>
            </nav>
        </header>

        <!-- Status Page -->
        <div id="statusPage" class="status-container active">
            <div id="statusMessage"></div>
            <div class="status-grid">
                <div class="status-card">
                    <h2>Prank Status</h2>
                    <div class="status-item">
                        <span class="status-label">Status</span>
                        <span id="statusBadge" class="status-badge badge-inactive">Loading...</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Next Apply</span>
                        <span id="nextApply" class="status-value">Loading...</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Next Restore</span>
                        <span id="nextRestore" class="status-value">Loading...</span>
                    </div>
                    <div class="action-buttons">
                        <button class="primary" onclick="applyNow()">Apply Now</button>
                        <button class="danger" onclick="restoreNow()">Restore Now</button>
                    </div>
                </div>

                <div class="status-card">
                    <h2>Statistics</h2>
                    <div class="status-item">
                        <span class="status-label">Total Items</span>
                        <span id="totalItems" class="status-value">-</span>
                    </div>
                    <div id="statusBreakdown"></div>
                </div>

                <div class="status-card">
                    <h2>Failed Items</h2>
                    <div id="failedItemsList"></div>
                </div>
            </div>
            <div style="text-align: right; color: #888; font-size: 12px;">
                <span>Last updated: <span id="lastUpdated">-</span></span>
                <button onclick="reloadStatus()" style="margin-left: 15px;">↻ Refresh</button>
                <button onclick="reloadConfig()" style="margin-left: 10px;">↻ Reload Config</button>
            </div>
        </div>

        <!-- Library Page -->
        <div id="libraryPage" class="library-container">
            <div class="library-header">
                <button class="back-button" onclick="showStatus()">← Back to Status</button>
                <label>
                    Select Library:
                    <select id="librarySelect" class="library-select" onchange="changeLibrary()">
                        <option>Loading...</option>
                    </select>
                </label>
            </div>

            <div id="libraryMessage"></div>
            <div class="library-info" id="libraryInfo">Loading...</div>

            <div id="posterGrid" class="poster-grid"></div>
            <div id="loadingIndicator" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading more items...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentLibrary = null;
        let currentPage = 1;
        let isLoading = false;
        let hasMoreItems = true;

        // ==================== Status Page ====================
        async function reloadStatus() {
            const res = await fetch(`${API_BASE}/status`);
            const data = await res.json();

            // Status badge
            const badge = document.getElementById('statusBadge');
            if (data.prank_active) {
                badge.textContent = '🟢 ACTIVE';
                badge.className = 'status-badge badge-active';
            } else {
                badge.textContent = '🔴 INACTIVE';
                badge.className = 'status-badge badge-inactive';
            }

            // Next times
            document.getElementById('nextApply').textContent = formatDateTime(data.next_apply);
            document.getElementById('nextRestore').textContent = formatDateTime(data.next_restore);

            // Statistics
            document.getElementById('totalItems').textContent = data.items.total;
            const breakdown = document.getElementById('statusBreakdown');
            breakdown.innerHTML = '';
            for (const [status, count] of Object.entries(data.items)) {
                if (status !== 'total') {
                    breakdown.innerHTML += `
                        <div class="status-item">
                            <span class="status-label">${status}</span>
                            <span class="status-value">${count}</span>
                        </div>
                    `;
                }
            }

            // Failed items
            const failedList = document.getElementById('failedItemsList');
            if (data.failed_items.length === 0) {
                failedList.innerHTML = '<div style="color: #888;">No failed items</div>';
            } else {
                failedList.innerHTML = data.failed_items.map(item => `
                    <div class="failed-item">
                        <div class="failed-item-name">${item.title}</div>
                        <div class="failed-item-retries">Retries: ${item.retry_count}/3</div>
                    </div>
                `).join('');
            }

            document.getElementById('lastUpdated').textContent = formatTime(data.last_updated);
        }

        async function applyNow() {
            if (!confirm('Apply pranks to all PRANK_GENERATED items?')) return;
            const res = await fetch(`${API_BASE}/apply-now`, { method: 'POST' });
            const data = await res.json();
            showMessage('statusMessage', data.message, data.success);
            if (data.success) setTimeout(reloadStatus, 1000);
        }

        async function restoreNow() {
            if (!confirm('Restore all PRANK_APPLIED items?')) return;
            const res = await fetch(`${API_BASE}/restore-now`, { method: 'POST' });
            const data = await res.json();
            showMessage('statusMessage', data.message, data.success);
            if (data.success) setTimeout(reloadStatus, 1000);
        }

        async function reloadConfig() {
            const res = await fetch(`${API_BASE}/config/reload`, { method: 'POST' });
            const data = await res.json();
            showMessage('statusMessage', 'Config reload signaled to daemon', data.success);
            if (data.success) setTimeout(reloadStatus, 2000);
        }

        // ==================== Library Page ====================
        async function loadLibraries() {
            const res = await fetch(`${API_BASE}/libraries`);
            const data = await res.json();
            const select = document.getElementById('librarySelect');
            select.innerHTML = data.libraries.map(lib =>
                `<option value="${lib.name}">${lib.name} (${lib.count})</option>`
            ).join('');
            if (data.libraries.length > 0) {
                currentLibrary = data.libraries[0].name;
                loadLibraryItems();
            }
        }

        async function changeLibrary() {
            const select = document.getElementById('librarySelect');
            currentLibrary = select.value;
            currentPage = 1;
            hasMoreItems = true;
            document.getElementById('posterGrid').innerHTML = '';
            loadLibraryItems();
        }

        async function loadLibraryItems() {
            if (!currentLibrary || isLoading || !hasMoreItems) return;

            isLoading = true;
            document.getElementById('loadingIndicator').style.display = 'block';

            const res = await fetch(
                `${API_BASE}/library/${currentLibrary}?page=${currentPage}&limit=20`
            );
            const data = await res.json();

            // Update info
            document.getElementById('libraryInfo').textContent =
                `Showing ${data.items.length} of ${data.total} items in "${data.library}"`;

            // Add posters
            const grid = document.getElementById('posterGrid');
            for (const item of data.items) {
                const div = document.createElement('div');
                div.className = 'poster-item';

                const wrapper = document.createElement('div');
                wrapper.className = 'poster-wrapper';

                // Original image
                const origImg = document.createElement('img');
                origImg.className = 'poster-image original';
                origImg.src = `${API_BASE}/posters/${item.item_id}/original`;
                origImg.alt = item.title;
                origImg.onerror = () => {
                    origImg.style.display = 'none';
                };

                // Prank image
                const prankImg = document.createElement('img');
                prankImg.className = 'poster-image prank';
                prankImg.src = `${API_BASE}/posters/${item.item_id}/prank`;
                prankImg.alt = item.title;
                prankImg.onerror = () => {
                    prankImg.style.display = 'none';
                };

                wrapper.appendChild(origImg);
                wrapper.appendChild(prankImg);

                const title = document.createElement('div');
                title.className = 'poster-title';
                title.textContent = item.title;

                div.appendChild(wrapper);
                div.appendChild(title);
                grid.appendChild(div);
            }

            // Check if more items
            hasMoreItems = (currentPage * 20) < data.total;
            currentPage++;

            document.getElementById('loadingIndicator').style.display = 'none';
            isLoading = false;
        }

        // ==================== Navigation ====================
        function showStatus() {
            document.getElementById('statusPage').classList.add('active');
            document.getElementById('libraryPage').classList.remove('active');
            document.getElementById('statusBtn').classList.add('primary');
            document.getElementById('libraryBtn').classList.remove('primary');
            reloadStatus();
        }

        function showLibrary() {
            document.getElementById('statusPage').classList.remove('active');
            document.getElementById('libraryPage').classList.add('active');
            document.getElementById('statusBtn').classList.remove('primary');
            document.getElementById('libraryBtn').classList.add('primary');
            if (!currentLibrary) {
                loadLibraries();
            }
        }

        // ==================== Utils ====================
        function formatDateTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString([], {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function showMessage(elementId, message, success) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="${success ? 'success-message' : 'error-message'}">${message}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 5000);
        }

        // ==================== Infinite Scroll ====================
        window.addEventListener('scroll', () => {
            if (document.getElementById('libraryPage').classList.contains('active')) {
                const scrollPos = window.innerHeight + window.scrollY;
                const threshold = document.documentElement.scrollHeight - 500;
                if (scrollPos >= threshold && !isLoading && hasMoreItems) {
                    loadLibraryItems();
                }
            }
        });

        // ==================== Init ====================
        reloadStatus();
        setInterval(reloadStatus, 5000);
    </script>
</body>
</html>
